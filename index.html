<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#6aa5ff">
<title>Mouse Jiggler</title>
<style>
:root{color-scheme:dark;--blue:#6aa5ff;--blue2:#3f7ef1;--ink:#071327;--panel:rgba(5,16,35,.88);--line:rgba(255,255,255,.18)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#05080d;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;color:#fff}
button,input{font:inherit}
#app{position:relative;width:100%;height:100%;min-height:100dvh;overflow:hidden;background:#05080d}
#pattern{position:absolute;inset:0;width:100%;height:100%;touch-action:none}
.shade{position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 50% 44%,transparent 30%,rgba(0,0,0,.18) 74%,rgba(0,0,0,.55) 100%)}
.setup{position:absolute;inset:0;display:grid;place-items:center;overflow:auto;padding:max(20px,env(safe-area-inset-top)) 20px max(20px,env(safe-area-inset-bottom));background:linear-gradient(160deg,rgba(106,165,255,.97),rgba(63,126,241,.9) 50%,rgba(11,31,68,.94));transition:.3s opacity,.3s visibility}
.setup.hidden{opacity:0;visibility:hidden;pointer-events:none}
.card{width:min(100%,390px);padding:25px;border:2px solid rgba(255,255,255,.5);border-radius:30px;background:rgba(5,17,40,.86);box-shadow:0 24px 80px rgba(2,12,35,.45);backdrop-filter:blur(18px)}
.logo{display:flex;align-items:center;gap:13px;margin-bottom:24px}
.logo-mark{width:52px;height:52px;display:grid;place-items:center;border-radius:17px;background:var(--blue);box-shadow:inset 0 0 0 2px rgba(255,255,255,.35);font-size:28px}
h1{margin:0;font-size:28px;line-height:1;font-weight:800;letter-spacing:-.03em}
.version{display:inline-block;margin-left:6px;padding:4px 7px;border-radius:999px;vertical-align:4px;background:#64f4a4;color:#071327;font-size:10px;letter-spacing:.04em}
.subtitle{margin:7px 0 0;color:#b9c9e8;font-size:14px}
.check{display:flex;align-items:center;gap:12px;margin:0 0 20px;padding:15px;border:1px solid var(--line);border-radius:17px;background:rgba(255,255,255,.06);cursor:pointer;user-select:none}
.check input{width:22px;height:22px;margin:0;accent-color:var(--blue)}
.check span{font-weight:700}
.speed-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:14px;font-weight:700}
.speed-value{min-width:48px;text-align:right;color:#9dc2ff}
.speed-group+.speed-group{margin-top:12px}
input[type=range]{width:100%;height:34px;margin:0;accent-color:var(--blue);cursor:pointer}
.range-labels{display:flex;justify-content:space-between;margin-top:2px;color:#93a6c7;font-size:12px}
.actions{display:grid;margin-top:22px}
button{min-height:54px;border:0;border-radius:17px;padding:0 18px;color:#fff;font-weight:850;letter-spacing:.02em;cursor:pointer}
.start{background:linear-gradient(135deg,#7eb2ff,#397cf1);box-shadow:0 10px 28px rgba(63,126,241,.4)}
.hint{margin:18px 4px 0;text-align:center;color:#aebed9;font-size:12px;line-height:1.45}
.running-ui{position:absolute;inset:0;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:max(12px,env(safe-area-inset-top)) 12px max(12px,env(safe-area-inset-bottom));opacity:0;visibility:hidden;transition:.25s opacity,.25s visibility}
.running-ui.visible{opacity:1;visibility:visible}
.topbar,.controlbar{pointer-events:auto;display:flex;align-items:center;gap:10px;width:min(100%,520px);margin-inline:auto;padding:9px;border:1px solid rgba(255,255,255,.18);border-radius:19px;background:var(--panel);box-shadow:0 12px 38px rgba(0,0,0,.28);backdrop-filter:blur(16px)}
.topbar{justify-content:space-between}
.status{display:flex;align-items:center;gap:9px;padding-left:5px;min-width:0;font-size:13px;font-weight:750}
.dot{width:9px;height:9px;flex:0 0 auto;border-radius:50%;background:#64f4a4;box-shadow:0 0 14px #64f4a4}
.status-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-btn{min-height:40px;padding:0 13px;border-radius:12px;background:rgba(255,255,255,.1);font-size:12px;white-space:nowrap}
.stop{background:#d94a62}
.controlbar{display:grid;grid-template-columns:1fr auto;gap:10px 12px;padding:12px 14px}
.vibe{display:flex;align-items:center;gap:7px;white-space:nowrap;font-size:12px;font-weight:750;cursor:pointer}
.vibe input{width:19px;height:19px;margin:0;accent-color:var(--blue)}
.live-sliders{grid-column:1/-1;display:grid;gap:8px}
.live-speed{min-width:0}
.live-speed label{display:flex;justify-content:space-between;margin-bottom:2px;font-size:11px;color:#c6d3e9}
.live-speed input{height:28px}
.cycle{justify-self:end;font-variant-numeric:tabular-nums;color:#9dc2ff;font-size:12px;font-weight:800;white-space:nowrap}
@media(max-width:420px){.card{padding:21px;border-radius:25px}h1{font-size:25px}.topbar,.controlbar{border-radius:16px}.mini-btn{padding:0 11px}.status-text{max-width:180px}}
@media(max-height:720px){.setup{place-items:start center}.card{padding:17px}.logo{margin-bottom:13px}.check{margin-bottom:10px;padding:10px}.speed-group+.speed-group{margin-top:7px}.speed-head{margin-bottom:3px}.range-labels{display:none}.actions{margin-top:12px}.hint{margin-top:8px}button{min-height:46px}}
</style>
</head>
<body>
<main id="app">
  <canvas id="pattern" aria-label="Движущийся контрастный паттерн для оптической мыши"></canvas>
  <div class="shade"></div>

  <section class="setup" id="setup">
    <div class="card">
      <div class="logo">
        <div class="logo-mark">↗</div>
        <div><h1>Mouse Jiggler <span class="version">OPTICAL v2</span></h1><p class="subtitle">Положите мышку сенсором на экран</p></div>
      </div>

      <label class="check" for="vibration">
        <input id="vibration" type="checkbox">
        <span>Включить вибрацию</span>
      </label>

      <div class="speed-group">
        <div class="speed-head"><label for="speed">Скорость движения</label><output class="speed-value" id="speedValue">50%</output></div>
        <input id="speed" type="range" min="1" max="100" value="50">
        <div class="range-labels"><span>Медленно</span><span>Быстро</span></div>
      </div>

      <div class="speed-group">
        <div class="speed-head"><label for="amplitude">Размах движения</label><output class="speed-value" id="amplitudeValue">28 px</output></div>
        <input id="amplitude" type="range" min="4" max="60" value="28">
        <div class="range-labels"><span>Мало</span><span>Сильно</span></div>
      </div>

      <div class="speed-group">
        <div class="speed-head"><label for="patternSize">Размер деталей паттерна</label><output class="speed-value" id="patternSizeValue">14 px</output></div>
        <input id="patternSize" type="range" min="8" max="48" value="14">
        <div class="range-labels"><span>Мелкие</span><span>Крупные</span></div>
      </div>

      <div class="speed-group">
        <div class="speed-head"><label for="vibrationSpeed">Скорость вибрации</label><output class="speed-value" id="vibrationSpeedValue">50%</output></div>
        <input id="vibrationSpeed" type="range" min="1" max="100" value="50">
        <div class="range-labels"><span>Редко</span><span>Часто</span></div>
      </div>

      <div class="actions">
        <button class="start" id="start" type="button">START</button>
      </div>
      <p class="hint">Псевдослучайная текстура лучше распознаётся оптическим сенсором мыши.</p>
    </div>
  </section>

  <section class="running-ui" id="runningUi">
    <div class="topbar">
      <div class="status"><span class="dot"></span><span class="status-text" id="wakeStatus">Экран активен</span></div>
      <div>
        <button class="mini-btn stop" id="stop" type="button">Стоп</button>
      </div>
    </div>
    <div class="controlbar">
      <label class="vibe" for="liveVibration"><input id="liveVibration" type="checkbox">Вибрация</label>
      <div class="cycle" id="cycle">Круг 1</div>
      <div class="live-sliders">
        <div class="live-speed"><label for="liveSpeed"><span>Скорость движения</span><output id="liveSpeedValue">50%</output></label><input id="liveSpeed" type="range" min="1" max="100" value="50"></div>
        <div class="live-speed"><label for="liveAmplitude"><span>Размах движения</span><output id="liveAmplitudeValue">28 px</output></label><input id="liveAmplitude" type="range" min="4" max="60" value="28"></div>
        <div class="live-speed"><label for="livePatternSize"><span>Размер деталей</span><output id="livePatternSizeValue">14 px</output></label><input id="livePatternSize" type="range" min="8" max="48" value="14"></div>
        <div class="live-speed"><label for="liveVibrationSpeed"><span>Скорость вибрации</span><output id="liveVibrationSpeedValue">50%</output></label><input id="liveVibrationSpeed" type="range" min="1" max="100" value="50"></div>
      </div>
    </div>
  </section>
  <video id="keepAliveVideo" muted playsinline loop aria-hidden="true" style="position:absolute;width:1px;height:1px;opacity:.001;pointer-events:none"></video>
</main>

<script>
(() => {
  "use strict";
  const app=document.getElementById("app"),canvas=document.getElementById("pattern"),context=canvas.getContext("2d",{alpha:false}),setup=document.getElementById("setup"),runningUi=document.getElementById("runningUi"),startButton=document.getElementById("start"),stopButton=document.getElementById("stop"),speed=document.getElementById("speed"),liveSpeed=document.getElementById("liveSpeed"),speedValue=document.getElementById("speedValue"),liveSpeedValue=document.getElementById("liveSpeedValue"),amplitude=document.getElementById("amplitude"),liveAmplitude=document.getElementById("liveAmplitude"),amplitudeValue=document.getElementById("amplitudeValue"),liveAmplitudeValue=document.getElementById("liveAmplitudeValue"),patternSize=document.getElementById("patternSize"),livePatternSize=document.getElementById("livePatternSize"),patternSizeValue=document.getElementById("patternSizeValue"),livePatternSizeValue=document.getElementById("livePatternSizeValue"),vibration=document.getElementById("vibration"),liveVibration=document.getElementById("liveVibration"),vibrationSpeed=document.getElementById("vibrationSpeed"),liveVibrationSpeed=document.getElementById("liveVibrationSpeed"),vibrationSpeedValue=document.getElementById("vibrationSpeedValue"),liveVibrationSpeedValue=document.getElementById("liveVibrationSpeedValue"),wakeStatus=document.getElementById("wakeStatus"),cycleLabel=document.getElementById("cycle"),keepAliveVideo=document.getElementById("keepAliveVideo");

  const field=document.createElement("canvas"),fieldContext=field.getContext("2d"),fieldMargin=96,keepAliveCanvas=document.createElement("canvas"),keepAliveContext=keepAliveCanvas.getContext("2d");
  let running=false,wakeLock=null,vibrationTimer=null,patternTimer=null,resizeTimer=null,animationFrame=0,lastTime=0,phase=0,cycle=1,lastPosition={x:0,y:0};

  function makeField(width,height){
    const cell=Number(patternSize.value),largePatternSize=2560;
    field.width=Math.max(largePatternSize,Math.ceil(width)+fieldMargin*2);field.height=Math.max(largePatternSize,Math.ceil(height)+fieldMargin*2);
    fieldContext.fillStyle="#f6f2e7";
    fieldContext.fillRect(0,0,field.width,field.height);
    fieldContext.fillStyle="#050505";
    for(let y=0;y<field.height;y+=cell){
      for(let x=0;x<field.width;x+=cell){
        const column=Math.floor(x/cell),row=Math.floor(y/cell),hash=cellHash(column,row);
        if(hash&1)fieldContext.fillRect(x,y,cell,cell);
        if(hash&2){
          const inset=Math.max(2,Math.round(cell*.3));
          fieldContext.fillStyle=hash&1?"#f6f2e7":"#050505";
          fieldContext.fillRect(x+inset,y+inset,Math.max(1,cell-inset*2),Math.max(1,cell-inset*2));
          fieldContext.fillStyle="#050505";
        }
      }
    }
  }

  function cellHash(column,row){
    let value=Math.imul(column+0x7ed55d16,0x85ebca6b)^Math.imul(row+0x165667b1,0xc2b2ae35);
    value^=value>>>15;value=Math.imul(value,0x2c1b3c6d);value^=value>>>12;value=Math.imul(value,0x297a2d39);value^=value>>>15;
    return value>>>0;
  }

  function resize(){
    const scale=Math.min(devicePixelRatio||1,2),width=innerWidth,height=innerHeight;
    canvas.width=Math.round(width*scale);canvas.height=Math.round(height*scale);
    canvas.style.width=width+"px";canvas.style.height=height+"px";
    context.setTransform(scale,0,0,scale,0,0);
    makeField(width,height);
    draw(lastPosition.x,lastPosition.y);
  }

  function positionAt(value){
    const t=value*Math.PI*2,r=Number(amplitude.value);
    return{x:r*(.64*Math.sin(t)+.23*Math.sin(t*3)+.13*Math.sin(t*7)),y:r*(.58*Math.sin(t*2)+.27*Math.sin(t*5)+.15*Math.sin(t*8))};
  }

  function draw(offsetX,offsetY){
    const width=canvas.clientWidth||innerWidth,height=canvas.clientHeight||innerHeight;
    context.save();context.imageSmoothingEnabled=false;
    context.setTransform(devicePixelRatio>2?2:devicePixelRatio||1,0,0,devicePixelRatio>2?2:devicePixelRatio||1,0,0);
    context.fillStyle="#f6f2e7";context.fillRect(0,0,width,height);
    const sourceX=Math.round((field.width-width)/2-offsetX),sourceY=Math.round((field.height-height)/2-offsetY);
    context.drawImage(field,sourceX,sourceY,width,height,0,0,width,height);
    context.restore();
  }

  function animate(time){
    if(!running)return;
    const delta=Math.min((time-lastTime)/1000,.05)||0,speedNumber=Number(speed.value),cyclesPerSecond=.11+Math.pow(speedNumber/100,1.35)*1.65;
    lastTime=time;phase+=delta*cyclesPerSecond;
    if(phase>=1){
      phase%=1;cycle++;cycleLabel.textContent="Круг "+cycle;
    }
    lastPosition=positionAt(phase);
    draw(lastPosition.x,lastPosition.y);
    animationFrame=requestAnimationFrame(animate);
  }

  async function requestFullscreen(){
    try{
      if(!document.fullscreenElement){
        const target=document.documentElement;
        await (target.requestFullscreen?.({navigationUI:"hide"})||target.webkitRequestFullscreen?.());
      }
      screen.orientation?.lock?.("portrait")?.catch(()=>{});
    }catch(error){wakeStatus.textContent="Полный экран запрещен браузером"}
  }

  async function requestWakeLock(){
    try{
      if("wakeLock" in navigator){
        wakeLock=await navigator.wakeLock.request("screen");
        wakeStatus.textContent="Экран не погаснет";
        wakeLock.addEventListener("release",()=>{if(running)wakeStatus.textContent="Защита экрана временно снята"});
      }else wakeStatus.textContent="Резервное удержание экрана";
    }catch(error){wakeStatus.textContent="Резервное удержание экрана"}
  }

  async function startKeepAliveVideo(){
    try{
      keepAliveCanvas.width=keepAliveCanvas.height=2;
      keepAliveContext.fillStyle="#000";keepAliveContext.fillRect(0,0,2,2);
      if(keepAliveCanvas.captureStream){keepAliveVideo.srcObject=keepAliveCanvas.captureStream(1);await keepAliveVideo.play()}
    }catch(error){}
  }

  function updateVibration(){
    clearInterval(vibrationTimer);vibrationTimer=null;navigator.vibrate?.(0);
    if(!running||!vibration.checked||!("vibrate" in navigator))return;
    const value=Number(vibrationSpeed.value),delay=Math.round(3200-Math.pow(value/100,.72)*2850),pulseLength=Math.round(28+value*.22),pulse=()=>navigator.vibrate([pulseLength,70,pulseLength]);
    pulse();vibrationTimer=setInterval(pulse,delay);
  }

  function syncSpeed(source){
    const value=source.value;speed.value=liveSpeed.value=value;speedValue.textContent=liveSpeedValue.textContent=value+"%";
  }

  function syncVibration(source){vibration.checked=liveVibration.checked=source.checked;updateVibration()}

  function syncVibrationSpeed(source){
    const value=source.value;vibrationSpeed.value=liveVibrationSpeed.value=value;vibrationSpeedValue.textContent=liveVibrationSpeedValue.textContent=value+"%";updateVibration();
  }

  function syncAmplitude(source){
    const value=source.value;amplitude.value=liveAmplitude.value=value;amplitudeValue.textContent=liveAmplitudeValue.textContent=value+" px";
  }

  function syncPatternSize(source){
    const value=source.value;patternSize.value=livePatternSize.value=value;patternSizeValue.textContent=livePatternSizeValue.textContent=value+" px";
    clearTimeout(patternTimer);patternTimer=setTimeout(()=>{makeField(innerWidth,innerHeight);draw(lastPosition.x,lastPosition.y)},90);
  }

  function showUi(){
    if(!running)return;
    runningUi.classList.add("visible");
  }

  async function start(){
    if(running)return;
    running=true;phase=0;cycle=1;lastTime=performance.now();
    setup.classList.add("hidden");runningUi.classList.add("visible");liveVibration.checked=vibration.checked;
    await Promise.allSettled([requestFullscreen(),requestWakeLock(),startKeepAliveVideo()]);
    updateVibration();showUi();animationFrame=requestAnimationFrame(animate);
  }

  async function stop(){
    running=false;cancelAnimationFrame(animationFrame);clearInterval(vibrationTimer);navigator.vibrate?.(0);
    try{await wakeLock?.release()}catch(error){}wakeLock=null;
    keepAliveVideo.pause();keepAliveVideo.srcObject=null;
    runningUi.classList.remove("visible");setup.classList.remove("hidden");wakeStatus.textContent="Экран активен";
    if(document.fullscreenElement)document.exitFullscreen?.().catch(()=>{});
  }

  speed.addEventListener("input",()=>syncSpeed(speed));liveSpeed.addEventListener("input",()=>{syncSpeed(liveSpeed);showUi()});
  amplitude.addEventListener("input",()=>syncAmplitude(amplitude));liveAmplitude.addEventListener("input",()=>{syncAmplitude(liveAmplitude);showUi()});
  patternSize.addEventListener("input",()=>syncPatternSize(patternSize));livePatternSize.addEventListener("input",()=>{syncPatternSize(livePatternSize);showUi()});
  vibration.addEventListener("change",()=>syncVibration(vibration));liveVibration.addEventListener("change",()=>{syncVibration(liveVibration);showUi()});
  vibrationSpeed.addEventListener("input",()=>syncVibrationSpeed(vibrationSpeed));liveVibrationSpeed.addEventListener("input",()=>{syncVibrationSpeed(liveVibrationSpeed);showUi()});
  startButton.addEventListener("click",start);stopButton.addEventListener("click",stop);
  document.addEventListener("visibilitychange",()=>{if(running&&document.visibilityState==="visible")requestWakeLock()});
  document.addEventListener("fullscreenchange",()=>{if(running)showUi()});
  addEventListener("resize",()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(resize,100)},{passive:true});
  resize();syncSpeed(speed);syncAmplitude(amplitude);syncPatternSize(patternSize);syncVibrationSpeed(vibrationSpeed);
})();
</script>
</body>
</html>
